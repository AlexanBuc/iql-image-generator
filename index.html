<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IQL Image Generator</title>

    <!-- IQL Brand Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Caveat:wght@600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        iql: {
                            red:       '#ff4c4c',
                            redHover:  '#e63e3e',
                            blue:      '#272663',
                            lightRed:  '#feecec',
                            lightBlue: '#b9ceff',
                            muted:     '#9392af',
                        }
                    },
                    fontFamily: {
                        sans: ['"DM Sans"', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* ── Language-aware fonts ─────────────────────────── */
        :lang(he) { font-family: Calibri, Arial, sans-serif; }
        :lang(en) { font-family: 'DM Sans', Arial, sans-serif; }

        /* ── Full viewport — uses dynamic height on mobile ── */
        html, body {
            height: 100%;
        }
        body {
            /* dvh = accounts for mobile browser chrome shrink/expand */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
            color: #272663;
        }

        /* ── Grain texture overlay (like SHIELDbot) ─────── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 200;
            pointer-events: none;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── Scrollbar hide ──────────────────────────────── */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Spinner ─────────────────────────────────────── */
        .loader {
            border: 3px solid rgba(255, 76, 76, 0.15);
            border-radius: 50%;
            border-top: 3px solid #ff4c4c;
            width: 44px;
            height: 44px;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Q watermark ─────────────────────────────────── */
        .q-watermark {
            position: absolute;
            font-weight: 700;
            font-size: clamp(8rem, 40vw, 22rem);
            color: #272663;
            opacity: 0.028;
            line-height: 1;
            user-select: none;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'DM Sans', Arial, sans-serif;
        }

        /* ── Input shake ─────────────────────────────────── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-5px); }
            75%       { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease; }

        /* ── Fade-in for transitions ─────────────────────── */
        .fade-in { animation: fadeIn 0.35s cubic-bezier(0.16,1,0.3,1); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── Accent font for decorative use ──────────────── */
        .font-accent { font-family: 'Caveat', cursive; }

        /* ── Bottom bar safe-area padding (iPhone notch) ─── */
        .bottom-bar {
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }
    </style>
</head>

<body>

    <!-- ═══════════════════════════════════════════════════ HEADER -->
    <header class="bg-iql-blue text-white px-4 sm:px-6 py-3 flex items-center justify-between flex-shrink-0 z-10">

        <!-- Logo + title -->
        <div class="flex items-center gap-3">
            <div class="flex items-center leading-none select-none" aria-label="IQL">
                <span class="font-bold text-xl text-white tracking-tight">I</span>
                <span class="font-bold text-xl text-iql-red  tracking-tight">Q</span>
                <span class="font-bold text-xl text-white tracking-tight">L</span>
            </div>
            <div class="w-px h-5 bg-white/25 flex-shrink-0"></div>
            <span class="text-sm font-medium text-white/80 tracking-wide" id="header-title" lang="he">מחולל תמונות</span>
        </div>

        <!-- Right side: subtitle + lang toggle -->
        <div class="flex items-center gap-3">
            <span class="text-[11px] text-white/35 hidden sm:block tracking-widest uppercase" id="header-subtitle" lang="he">המכון למנהיגות איכותית</span>
            <button
                onclick="toggleLanguage()"
                id="lang-btn"
                class="px-3 py-1.5 rounded-lg bg-white border border-white/80
                       text-xs font-bold uppercase tracking-wider text-iql-blue
                       shadow-sm hover:bg-iql-lightRed transition-all">
                English
            </button>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════ IMAGE AREA -->
    <main class="flex-1 relative flex items-center justify-center overflow-hidden bg-white min-h-0">

        <!-- Q watermark (shown only on placeholder state) -->
        <span class="q-watermark" id="q-watermark" aria-hidden="true">Q</span>

        <!-- Placeholder -->
        <div id="placeholder" class="relative z-10 text-center px-6 max-w-xs mx-auto fade-in" lang="he">
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-iql-lightRed rounded-2xl flex items-center justify-center mx-auto mb-4 sm:mb-5">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
                     fill="none" stroke="#272663" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="m21 15-5-5L5 21"/>
                </svg>
            </div>
            <p class="font-bold text-iql-blue text-base sm:text-lg" id="placeholder-title">צור את התמונה שלך</p>
            <p class="text-iql-muted text-sm mt-1 leading-relaxed" id="placeholder-body">בחר סגנון, כתוב תיאור ולחץ על יצירה.</p>

            <!-- Decorative accent -->
            <p class="font-accent text-iql-red text-2xl mt-3 opacity-60 select-none">Make it Priceless</p>
        </div>

        <!-- Loading overlay -->
        <div id="loading"
             class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white/92 backdrop-blur-sm z-20">
            <div class="loader mb-4"></div>
            <span class="text-sm font-bold text-iql-red tracking-wide" id="loading-text" lang="he">יוצר את התמונה שלך...</span>
        </div>

        <!-- Generated image -->
        <img id="result-image"
             referrerpolicy="no-referrer"
             class="hidden max-h-full max-w-full object-contain p-3 sm:p-6 fade-in"
             src="" alt="">

        <!-- Download button -->
        <a id="download-btn"
           class="hidden absolute top-3 end-3 sm:top-4 sm:end-4
                  bg-iql-blue hover:bg-iql-blue/90 text-white
                  px-3 py-2 rounded-lg text-xs sm:text-sm font-medium
                  transition-all shadow-md flex items-center gap-1.5 z-10 no-underline">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span id="download-text" lang="he">הורדה</span>
        </a>
    </main>

    <!-- ══════════════════════════════════════ BOTTOM CONTROLS BAR -->
    <div class="bg-white border-t border-gray-100 px-4 sm:px-6 pt-3 flex-shrink-0 z-30 bottom-bar"
         style="box-shadow: 0 -4px 20px rgba(39,38,99,0.06);">

        <!-- Style chips (horizontally scrollable) -->
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"
             id="style-container"
             role="group"
             aria-label="סגנונות"></div>

        <!-- Prompt input + Generate button -->
        <div class="flex gap-2 mt-2 max-w-3xl mx-auto pb-1">
            <input
                type="text"
                id="prompt-input"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                lang="he"
                class="flex-1 min-w-0 border border-gray-200 rounded-xl px-4 py-3
                       text-sm text-iql-blue bg-white
                       focus:outline-none focus:border-iql-red focus:ring-2 focus:ring-iql-red/20
                       transition-all placeholder:text-iql-muted">

            <button
                onclick="generateImage()"
                id="gen-btn"
                aria-label="Generate"
                class="bg-iql-red hover:bg-iql-redHover text-white
                       px-4 sm:px-5 py-3 rounded-xl
                       font-medium text-sm transition-all active:scale-95
                       flex items-center gap-2 flex-shrink-0
                       shadow-md shadow-red-200/60 min-w-[48px]">
                <!-- Zap icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="currentColor" stroke="currentColor" stroke-width="0.5"
                     stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span id="gen-label" class="hidden sm:inline" lang="he">צור</span>
            </button>
        </div>
    </div>


    <!-- ══════════════════════════════════════════════ JAVASCRIPT -->
    <script>
    // ── Strings (EN / HE) ──────────────────────────────────────────────────────
    const STRINGS = {
        en: {
            headerTitle:        'Image Generator',
            headerSubtitle:     'INSTITUTE FOR QUALITY LEADERSHIP',
            langBtn:            'עברית',
            placeholderTitle:   'Create your image',
            placeholderBody:    'Choose a style, write your description, and generate.',
            loadingText:        'Creating your image…',
            downloadText:       'Download',
            promptPlaceholder:  'Describe your image…',
            genLabel:           'Generate',
            stylesLabel:        'Styles',
            styleNames: ['Realistic','Anime','Cyberpunk','Oil Painting','3D Render','Watercolor'],
        },
        he: {
            headerTitle:        'מחולל תמונות',
            headerSubtitle:     'המכון למנהיגות איכותית',
            langBtn:            'English',
            placeholderTitle:   'צור את התמונה שלך',
            placeholderBody:    'בחר סגנון, כתוב תיאור ולחץ על יצירה.',
            loadingText:        'יוצר את התמונה שלך…',
            downloadText:       'הורדה',
            promptPlaceholder:  'תאר את התמונה שלך…',
            genLabel:           'צור',
            stylesLabel:        'סגנונות',
            styleNames: ['ריאליסטי','אנימה','סייברפאנק','ציור שמן','תלת מימד','אקוורל'],
        }
    };

    // ── Style definitions (suffixes always English for best AI results) ────────
    const STYLE_IDS = ['Realistic','Anime','Cyberpunk','OilPainting','3D','Watercolor'];
    const STYLE_SUFFIXES = [
        'highly detailed, photorealistic, 8k, natural lighting',
        'anime style, studio ghibli, vibrant colors, detailed line art',
        'cyberpunk city, neon lights, futuristic, high contrast, sci-fi',
        'oil painting, textured brushstrokes, classic art style, masterpiece',
        '3d isometric, blender, cute, soft lighting, clay texture',
        'watercolor painting, soft edges, pastel tones, artistic',
    ];

    // ── State ──────────────────────────────────────────────────────────────────
    let lang         = 'he';
    let currentStyle = 0; // index into STYLE_IDS

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const htmlEl          = document.documentElement;
    const headerTitle     = $('header-title');
    const headerSubtitle  = $('header-subtitle');
    const langBtn         = $('lang-btn');
    const placeholderEl   = $('placeholder');
    const placeholderTitle= $('placeholder-title');
    const placeholderBody = $('placeholder-body');
    const loadingEl       = $('loading');
    const loadingText     = $('loading-text');
    const resultImage     = $('result-image');
    const qWatermark      = $('q-watermark');
    const downloadBtn     = $('download-btn');
    const downloadText    = $('download-text');
    const styleContainer  = $('style-container');
    const promptInput     = $('prompt-input');
    const genBtn          = $('gen-btn');
    const genLabel        = $('gen-label');

    // ── Build initial style chips ──────────────────────────────────────────────
    function buildStyleChips() {
        styleContainer.innerHTML = '';
        const s = STRINGS[lang];
        styleContainer.setAttribute('aria-label', s.stylesLabel);
        STYLE_IDS.forEach((id, i) => {
            const btn = document.createElement('button');
            btn.dataset.idx = i;
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', i === currentStyle ? 'true' : 'false');
            setChipStyle(btn, i === currentStyle);
            btn.onclick = () => selectStyle(i);
            styleContainer.appendChild(btn);
        });
        updateChipLabels();
    }

    function updateChipLabels() {
        const names = STRINGS[lang].styleNames;
        Array.from(styleContainer.children).forEach((btn, i) => {
            btn.textContent = names[i];
            btn.setAttribute('lang', lang);
        });
    }

    function setChipStyle(btn, active) {
        btn.className = [
            'flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-all whitespace-nowrap',
            active
                ? 'bg-iql-blue border-iql-blue text-white shadow-sm'
                : 'bg-white border-gray-200 text-iql-muted hover:border-iql-blue hover:text-iql-blue'
        ].join(' ');
    }

    function selectStyle(idx) {
        currentStyle = idx;
        Array.from(styleContainer.children).forEach((btn, i) => {
            setChipStyle(btn, i === idx);
            btn.setAttribute('aria-checked', i === idx ? 'true' : 'false');
        });
    }

    // ── Language toggle ────────────────────────────────────────────────────────
    function toggleLanguage() {
        lang = lang === 'he' ? 'en' : 'he';
        applyLanguage();
    }

    function applyLanguage() {
        const s = STRINGS[lang];
        const isHe = lang === 'he';

        htmlEl.lang = lang;
        htmlEl.dir  = isHe ? 'rtl' : 'ltr';

        // Header
        headerTitle.textContent   = s.headerTitle;
        headerTitle.lang          = lang;
        headerSubtitle.textContent= s.headerSubtitle;
        headerSubtitle.lang       = lang;
        langBtn.textContent       = s.langBtn;

        // Placeholder
        placeholderEl.lang        = lang;
        placeholderTitle.textContent = s.placeholderTitle;
        placeholderBody.textContent  = s.placeholderBody;

        // Loading
        loadingText.textContent   = s.loadingText;
        loadingText.lang          = lang;

        // Download
        downloadText.textContent  = s.downloadText;
        downloadText.lang         = lang;

        // Input
        promptInput.placeholder   = s.promptPlaceholder;
        promptInput.lang          = lang;
        promptInput.dir           = isHe ? 'rtl' : 'ltr';

        // Generate button
        genLabel.textContent      = s.genLabel;
        genLabel.lang             = lang;

        // Style chips
        updateChipLabels();
    }

    // ── Image generation ───────────────────────────────────────────────────────
    async function generateImage() {
        const prompt = promptInput.value.trim();

        if (!prompt) {
            promptInput.classList.add('shake', 'border-iql-red');
            promptInput.focus();
            setTimeout(() => promptInput.classList.remove('shake', 'border-iql-red'), 600);
            return;
        }

        // Loading state
        loadingEl.classList.remove('hidden');
        placeholderEl.classList.add('hidden');
        qWatermark.classList.add('hidden');
        resultImage.classList.add('hidden');
        downloadBtn.classList.add('hidden');
        genBtn.disabled = true;
        genBtn.classList.add('opacity-60', 'cursor-not-allowed');

        try {
            const response = await fetch('/api/generate', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model:   'gpt-image-1',
                    prompt:  `${prompt}, ${STYLE_SUFFIXES[currentStyle]}`,
                    n:       1,
                    size:    '1024x1024',
                    quality: 'low'
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let imageUrl;
            if      (data.data[0].b64_json) imageUrl = 'data:image/png;base64,' + data.data[0].b64_json;
            else if (data.data[0].url)      imageUrl = data.data[0].url;
            else throw new Error('No image data returned from API');

            resultImage.src = imageUrl;
            resultImage.alt = prompt;

            resultImage.onload = () => {
                loadingEl.classList.add('hidden');
                resultImage.classList.remove('hidden');
                resultImage.classList.add('fade-in');
                downloadBtn.classList.remove('hidden');
            };
            resultImage.onerror = () => {
                loadingEl.classList.add('hidden');
                placeholderEl.classList.remove('hidden');
                qWatermark.classList.remove('hidden');
            };

            downloadBtn.href     = imageUrl;
            downloadBtn.download = `iql-image-${Date.now()}.png`;

        } catch (err) {
            alert(err.message);
            loadingEl.classList.add('hidden');
            placeholderEl.classList.remove('hidden');
            qWatermark.classList.remove('hidden');
        } finally {
            genBtn.disabled = false;
            genBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        }
    }

    // Enter key
    promptInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') generateImage();
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    buildStyleChips();
    applyLanguage(); // sets initial Hebrew state
    </script>
</body>
</html>
